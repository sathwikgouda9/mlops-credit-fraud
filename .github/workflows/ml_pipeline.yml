# .github/workflows/ml_pipeline.yml
#
# Triggered on every push to main or any PR.
# Pipeline:
#   1. Lint + unit tests
#   2. DVC repro (train the model using cached stages)
#   3. Shadow deployment comparison
#   4. Drift detection gate
#   5. Build & push Docker image (main branch only)

name: ML CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/credit-fraud-api
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Job 1: Lint & Unit Tests
  # ────────────────────────────────────────────────────────────────────────
  test:
    name: "Lint & Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov

      - name: Lint with Ruff
        run: ruff check src/ api/ monitoring/ tests/

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80   # enforce minimum 80% coverage

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml

  # ────────────────────────────────────────────────────────────────────────
  # Job 2: DVC Pipeline (train)
  # ────────────────────────────────────────────────────────────────────────
  train:
    name: "DVC Repro (train model)"
    runs-on: ubuntu-latest
    needs: test
    # Only run on pushes (not PRs) to avoid triggering expensive training
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure DVC remote (S3 example)
        # Replace with your own remote — gdrive, azure, etc.
        run: |
          dvc remote modify myremote access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          dvc remote modify myremote secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Pull DVC-tracked data
        run: dvc pull data/raw/creditcard.csv

      - name: Reproduce DVC pipeline (uses cache for unchanged stages)
        run: dvc repro

      - name: Push updated artifacts back to DVC remote
        run: dvc push

      - name: Show metrics
        run: dvc metrics show

      - name: Show metric diff vs previous commit
        run: dvc metrics diff HEAD~1 || true

      - name: Upload reports as CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-reports
          path: reports/
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────
  # Job 3: Shadow Deployment — compare new model vs production
  # ────────────────────────────────────────────────────────────────────────
  shadow_deploy:
    name: "Shadow Deployment Comparison"
    runs-on: ubuntu-latest
    needs: train
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download trained model artifacts
        uses: actions/download-artifact@v4
        with:
          name: ml-reports
          path: reports/

      - name: Pull models from DVC
        run: dvc pull models/

      - name: Run shadow deployment comparison
        # This script runs both models on a validation batch and checks
        # that the new model doesn't regress on key metrics
        run: |
          python scripts/shadow_compare.py \
            --prod-model   models/model_v_previous.pkl \
            --shadow-model models/model.pkl \
            --data         data/processed/X_test.pkl \
            --labels       data/processed/y_test.pkl \
            --threshold    0.01   # fail if new model F1 drops by more than 1pp

      - name: Upload shadow comparison report
        uses: actions/upload-artifact@v4
        with:
          name: shadow-report
          path: reports/shadow_comparison.json

  # ────────────────────────────────────────────────────────────────────────
  # Job 4: Drift Detection Gate
  # ────────────────────────────────────────────────────────────────────────
  drift_check:
    name: "Evidently Drift Gate"
    runs-on: ubuntu-latest
    needs: train
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull DVC data
        run: dvc pull data/processed/

      - name: Run drift detection
        # Exit code 1 if drift exceeds threshold → blocks deployment
        run: |
          python monitoring/drift_report.py \
            --reference data/processed/X_train.pkl \
            --current   data/processed/X_test.pkl \
            --output    reports/drift/

      - name: Upload drift report
        if: always()   # upload even if drift check fails
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: reports/drift/

  # ────────────────────────────────────────────────────────────────────────
  # Job 5: Docker Build & Push  (main branch only, after all gates pass)
  # ────────────────────────────────────────────────────────────────────────
  docker:
    name: "Build & Push Docker Image"
    runs-on: ubuntu-latest
    needs: [shadow_deploy, drift_check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Pull trained model from DVC
        run: dvc pull models/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed image → ${{ steps.meta.outputs.tags }}"
