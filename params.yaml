# params.yaml — single source of truth for all hyperparameters
# DVC reads this; MLflow logs every key automatically.

preprocess:
  test_size: 0.2
  random_state: 42
  target_col: "Class"          # 0 = legit, 1 = fraud
  scale_features: true
  smote_sampling_strategy: 0.1 # minority class ratio after SMOTE

train:
  # Random Forest (swap to XGBoost/LightGBM by changing model_type)
  model_type: "random_forest"
  n_estimators: 300
  max_depth: 10
  min_samples_split: 5
  class_weight: "balanced"
  random_state: 42
  mlflow_experiment: "credit-fraud-detection"
  mlflow_run_name: "rf-baseline"

evaluate:
  threshold: 0.5               # classification decision boundary
  primary_metric: "f1"         # metric used for model comparison

monitoring:
  drift_threshold: 0.1         # PSI threshold to trigger alert
  reference_window: 30000      # rows used as reference distribution
  retrain_on_drift: false      # set true to auto-trigger retrain job
  alert_email: "mlops-team@yourcompany.com"

api:
  model_path: "models/model.pkl"
  shadow_model_path: "models/shadow_model.pkl"
  log_predictions: true
