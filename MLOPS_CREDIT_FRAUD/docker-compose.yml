# docker-compose.yml
# Spins up the full local MLOps stack with one command:
#   docker compose up --build
#
# Services:
#   api      — FastAPI model server          → http://localhost:8000
#   mlflow   — Experiment tracking UI        → http://localhost:5000
#   postgres — MLflow backend store          (internal)
#   minio    — S3-compatible artifact store  → http://localhost:9001 (console)

version: "3.9"

services:

  # ── FastAPI model server ─────────────────────────────────────────────────
  api:
    build:
      context: .
      target: runtime
    image: credit-fraud-api:local
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      # Mount models dir so you can swap models without rebuilding the image
      - ./models:/app/models:ro
      - ./data/processed:/app/data/processed:ro
      - ./params.yaml:/app/params.yaml:ro
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── MLflow tracking server ───────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    command: >
      mlflow server
      --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── PostgreSQL (MLflow backend) ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible artifact store) ────────────────────────────────
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Web console  → login: minioadmin / minioadmin
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ── MinIO bucket init (runs once then exits) ─────────────────────────────
  minio_init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/mlflow-artifacts &&
      mc mb -p local/dvc-store &&
      echo 'Buckets created ✓'
      "
    restart: "no"

volumes:
  postgres_data:
  minio_data:
